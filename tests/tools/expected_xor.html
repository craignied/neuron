body { font-family: system-ui, sans-serif; margin: 2rem auto; max-width: 34rem;

h1 { font-size: 1.3rem; }
form { display: grid; grid-template-columns: 1fr auto; gap: .55rem .9rem;

<body>
<h1>XOR is true</h1>
<form onsubmit="run(); return false;">
<label for="v0">Input A</label><span><select id="v0"><option value="1">on (1)</option><option value="0">off (0)</option></select></span>
<label for="v1">Input B</label><span><select id="v1"><option value="1">on (1)</option><option value="0">off (0)</option></select></span>
<button id="go" type="submit">Compute</button>
</form>
<div id="out">
  <div class="p" id="prob"></div>
  <div id="oddsline"></div>
</div>
<p class="foot">Model deployed with neuron2web.py (neuron 3.0). The
computation runs entirely in this page; no data leaves your machine.</p>
<script>
"use strict";
const LB = -0.9;
const S = [1.8, 1.8];
const XMIN = [0.0, 0.0];
const HW = [[3.43267, 3.43267, 3.00534],
  [4.03055, 4.03055, -3.56294],
  [3.43333, 3.43333, 3.00593]];
const OW = [6.72444, -13.2692, 6.72834, -6.36322];
function model(xs) {
  let z = OW[OW.length - 1];
  for (let j = 0; j < HW.length; j++) {
    let h = HW[j][HW[j].length - 1];
    for (let i = 0; i < xs.length; i++) h += HW[j][i] * xs[i];
    z += OW[j] * sigmoid(h);
  }
  return sigmoid(z);
}
function sigmoid(x) { return 1 / (1 + Math.exp(-x)); }
function num(id) { return parseFloat(document.getElementById(id).value) || 0; }
function onehot(cols, hot, k) {
  for (let i = 0; i < k; i++) cols.push(i === hot ? 1 : 0);
}
function run() {
  const cols = [];
  cols.push(num("v0"));
  cols.push(num("v1"));
  const xs = cols.map((x, i) => S[i] * (x - XMIN[i]) + LB);
  const p = model(xs);
  const win = p >= 0.5;
  const pct = (100 * (win ? p : 1 - p)).toFixed(1);
  document.getElementById("prob").textContent =
    (win ? "XOR is true" : "XOR is false") + ": " + pct + "% probability";
  const odds = p / (1 - p);
  document.getElementById("oddsline").textContent = "Odds that XOR is true: " + (odds >= 1 ? odds.toFixed(2) + " to 1" : "1 to " + (1 / odds).toFixed(2));
  document.getElementById("out").style.display = "block";
}
</script>
