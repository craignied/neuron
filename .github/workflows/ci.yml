name: CI

on: [push, pull_request]

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install GSL (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgsl-dev

      - name: Install GSL (macOS)
        if: runner.os == 'macOS'
        run: brew install gsl

      - name: Cache vcpkg (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-gsl-${{ runner.os }}-x64

      - name: Install GSL (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install gsl:x64-windows

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build --config Release

      - name: Unit tests (binormal ROC vs signal detection theory)
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Golden transcript test
        shell: bash
        run: ./tests/golden/run_golden.sh

      - name: Python tools test (stdlib-only, system python3)
        shell: bash
        run: ./tests/tools/run_tools.sh
